spring.application.name=user-service
server.port=8084

# Eureka Client (Docker: DISCOVERY_HOST=discovery-server)
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:localhost}:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=user-service

# MySQL (XAMPP: default empty password for root; Docker: set MYSQL_PASSWORD=root in compose or env)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Keycloak JWT Validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}/realms/alzheimer-realm/protocol/openid-connect/certs

# Keycloak Admin API
keycloak.admin.server-url=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}
keycloak.admin.realm=alzheimer-realm
keycloak.admin.client-id=admin-cli
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_SECRET:}
keycloak.admin.username=${KEYCLOAK_ADMIN_USER:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Logging
logging.level.com.alzheimer.userservice=DEBUG
logging.level.org.springframework.security=DEBUG

spring.config.import=optional:classpath:application-local.properties
