spring.application.name=user-service
server.port=8084

# Eureka Client
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:discovery-server}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=user-service

# MySQL Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Keycloak JWT Validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:keycloak}:8080/realms/alzheimer-realm/protocol/openid-connect/certs

# Keycloak Admin API
keycloak.admin.server-url=http://${KEYCLOAK_HOST:keycloak}:8080
keycloak.admin.realm=alzheimer-realm
keycloak.admin.client-id=admin-cli
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_SECRET:}
keycloak.admin.username=${KEYCLOAK_ADMIN_USER:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Logging
logging.level.com.alzheimer.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
