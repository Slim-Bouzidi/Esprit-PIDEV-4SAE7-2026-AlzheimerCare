spring.application.name=patient-service
server.port=8082

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Eureka (Docker: DISCOVERY_HOST=discovery-server)
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:localhost}:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=patient-service

# MySQL (XAMPP: default empty root password; Docker: MYSQL_PASSWORD=root)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/patientdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Keycloak JWT validation
keycloak.auth-server-url=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}/realms/alzheimer-realm/protocol/openid-connect/certs

# User Service URL (Docker: USER_SERVICE_HOST=user-service)
user.service.url=http://${USER_SERVICE_HOST:localhost}:8084

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.config.import=optional:classpath:application-local.properties
