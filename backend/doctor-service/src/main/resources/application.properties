spring.application.name=DOCTOR-SERVICE
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/gestion_patients?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=8085

# Eureka configuration
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:localhost}:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# In Kubernetes: picks up the pod's cluster IP automatically (pods have one non-loopback interface)
# In local dev: override in application-local.properties to force 127.0.0.1
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${DOCTOR_HOST:DOCTOR-SERVICE}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Allow optional local overrides (ignored by git)
spring.config.import=optional:classpath:application-local.properties
