apiVersion: v1
kind: Service
metadata:
  name: support-network
  namespace: alzheimer
spec:
  ports:
    - port: 8089
  selector:
    app: support-network
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-network
  namespace: alzheimer
spec:
  selector:
    matchLabels:
      app: support-network
  template:
    metadata:
      labels:
        app: support-network
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: support-network
        image: 192.168.192.130:30083/alzheimer-support-network:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: alzheimer-config
        env:
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: ""
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: alzheimer-config
              key: SPRING_DATASOURCE_URL_NETWORK
