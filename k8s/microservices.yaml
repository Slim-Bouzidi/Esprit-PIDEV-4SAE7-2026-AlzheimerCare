################################################################################
# USER SERVICE
################################################################################
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: alzheimer
spec:
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: alzheimer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: user-service
        image: 192.168.80.128:30082/alzheimer-user-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: alzheimer-config
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: alzheimer-config
              key: SPRING_DATASOURCE_URL_USER
---
################################################################################
# API GATEWAY  (NodePort 30080)
################################################################################
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: alzheimer
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: alzheimer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: api-gateway
        image: 192.168.80.128:30082/alzheimer-api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: alzheimer-config
        volumeMounts:
        - name: gateway-override
          mountPath: /app/config
      volumes:
      - name: gateway-override
        configMap:
          name: api-gateway-override
---
