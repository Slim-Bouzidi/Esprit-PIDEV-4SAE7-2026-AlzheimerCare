################################################################################
# SUPPORT NETWORK  (Spring Boot 3 — port 8089)
################################################################################
apiVersion: v1
kind: Service
metadata:
  name: support-network
  namespace: alzheimer
spec:
  ports:
    - port: 8089
      targetPort: 8089
  selector:
    app: support-network
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-network
  namespace: alzheimer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: support-network
  template:
    metadata:
      labels:
        app: support-network
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: support-network
        image: 192.168.80.128:30082/alzheimer-support-network:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8089
        envFrom:
        - configMapRef:
            name: alzheimer-config
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: alzheimer-config
              key: SPRING_DATASOURCE_URL_SUPPORT
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: root
        - name: DISCOVERY_HOST
          value: discovery-server
        - name: KEYCLOAK_HOST
          value: keycloak
        - name: KEYCLOAK_PORT
          value: "8080"
        - name: VM_IP
          value: "192.168.80.128"
