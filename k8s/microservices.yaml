apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: alzheimer
spec:
  ports:
    - port: 8084
  selector:
    app: user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: alzheimer
spec:
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: user-service
        image: 192.168.192.130:30083/alzheimer-user-service:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: alzheimer-config
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: alzheimer-config
              key: SPRING_DATASOURCE_URL_USER
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: alzheimer
spec:
  type: NodePort
  ports:
    - port: 8080
      nodePort: 30080 # Access your API on VM_IP:30080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: alzheimer
spec:
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: api-gateway
        image: 192.168.192.130:30083/alzheimer-api-gateway:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: alzheimer-config
        volumeMounts:
        - name: gateway-override
          mountPath: /app/config
      volumes:
      - name: gateway-override
        configMap:
          name: api-gateway-override
---
apiVersion: v1
kind: Service
metadata:
  name: cognitive-service
  namespace: alzheimer
spec:
  ports:
    - port: 8083
  selector:
    app: cognitive-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-service
  namespace: alzheimer
spec:
  selector:
    matchLabels:
      app: cognitive-service
  template:
    metadata:
      labels:
        app: cognitive-service
    spec:
      imagePullSecrets:
      - name: nexus-creds
      containers:
      - name: cognitive-service
        image: 192.168.192.130:30083/alzheimer-cognitive-service:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: alzheimer-config
        env:
        - name: ML_SERVICE_URL
          value: "http://ml-service:5000"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: alzheimer-config
              key: SPRING_DATASOURCE_URL_COGNITIVE
