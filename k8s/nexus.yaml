apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-pvc
  namespace: alzheimer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: alzheimer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
      - name: nexus
        image: sonatype/nexus3:latest
        ports:
        - containerPort: 8081
        - containerPort: 8082 # Docker Hosted Port (we will use this later)
        resources:
          limits:
            memory: "4Gi"
          requests:
            memory: "2Gi"
        env:
        - name: INSTALL4J_ADD_VM_PARAMS
          value: "-Xms1g -Xmx1g -XX:MaxDirectMemorySize=1g"
        volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      volumes:
      - name: nexus-data
        persistentVolumeClaim:
          claimName: nexus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: alzheimer
spec:
  type: NodePort
  ports:
    - name: nexus-ui
      port: 8081
      targetPort: 8081
      nodePort: 30082
    - name: nexus-docker
      port: 8082
      targetPort: 8082
      nodePort: 30083
  selector:
    app: nexus
