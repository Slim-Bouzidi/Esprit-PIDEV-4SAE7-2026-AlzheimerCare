services:

  # ───────────────────── Infrastructure ─────────────────────

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - alzheimer-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ───────────────────── Discovery Server ─────────────────────

  discovery-server:
    build:
      context: ../backend/discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-server
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER-WITH-EUREKA: "false"
      EUREKA_CLIENT_FETCH-REGISTRY: "false"
    networks:
      - alzheimer-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ───────────────────── API Gateway ─────────────────────

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8090:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      # Route - assistance-quotidienne (toutes les routes)
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: assistance-quotidienne
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: lb://assistance-quotidienne
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/**
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0: DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      # Global default filter
      SPRING_CLOUD_GATEWAY_DEFAULT-FILTERS_0: DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - alzheimer-network

  # ───────────────────── Assistance Quotidienne ─────────────────────

  assistance-quotidienne:
    build:
      context: "../backend/assistance quotidienne"
      dockerfile: Dockerfile
    container_name: assistance-quotidienne
    ports:
      - "8098:8088"
    environment:
      SPRING_APPLICATION_NAME: assistance-quotidienne
      SERVER_PORT: 8088
      EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/assistancequotidiennedb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_DATASOURCE_DRIVER-CLASS-NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_SHOW-SQL: "true"
      SPRING_JPA_HIBERNATE_DDL-AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_GLOBALLY_QUOTED_IDENTIFIERS: "true"
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - alzheimer-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ───────────────────── Keycloak avec PostgreSQL ─────────────────────

  postgres-keycloak:
    image: postgres:15-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - alzheimer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.3
    container_name: keycloak
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    command: start-dev
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - alzheimer-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

networks:
  alzheimer-network:
    driver: bridge

volumes:
  keycloak-postgres-data:
    driver: local
