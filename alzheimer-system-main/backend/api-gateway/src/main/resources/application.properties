spring.application.name=api-gateway
server.port=8080

# Eureka (Docker: DISCOVERY_HOST=discovery-server)
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:localhost}:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${GATEWAY_HOST:localhost}

# Gateway routes (Path patterns: comma-separated, no spaces — avoids invalid patterns)
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**,/api/clinical-records/**,/api/assignments/**,/api/delivery-tasks/**,/api/meal-slots/**,/api/route-stops/**,/api/routes/**,/api/shifts/**,/api/staff-profiles/**

spring.cloud.gateway.routes[1].id=cognitive-service
spring.cloud.gateway.routes[1].uri=lb://cognitive-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cognitive-activities/**,/api/cognitive/analysis/**

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=support-network
spring.cloud.gateway.routes[3].uri=lb://support-network
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/missions/**,/api/alerts/**,/api/notifications/**,/api/availability/**,/api/dispatch/**,/api/engine/**,/api/network/**,/api/members/**,/api/skills/**,/api/support-patients/**,/api/reports/**,/api/dashboard/**

spring.cloud.gateway.routes[4].id=AlzheimerApp
spring.cloud.gateway.routes[4].uri=lb://ALZHEIMERAPP
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/articles/**,/api/comments/**,/api/patient/**,/api/treatment/**,/api/emergencyContact/**,/api/medicalRecord/**

# Global CORS configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${FRONTEND_URL:http://localhost:4200},http://${VM_IP:localhost}:30420
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,x-user-id
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# Global filter to deduplicate CORS on all routes
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Keycloak JWT validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}/realms/alzheimer-realm/protocol/openid-connect/certs

spring.config.import=optional:classpath:application-local.properties
