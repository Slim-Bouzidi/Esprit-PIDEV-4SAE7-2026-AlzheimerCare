spring.application.name=cognitive-service
server.port=8083

# Eureka (local: localhost; Docker: set DISCOVERY_HOST=discovery-server)
eureka.client.service-url.defaultZone=http://${DISCOVERY_HOST:localhost}:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=cognitive-service

# MySQL (XAMPP: 127.0.0.1:3306, empty root password by default; Docker: set MYSQL_PASSWORD=root)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/cognitivedb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Keycloak JWT validation (host: port 8081 maps to Keycloak in docker-compose)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8081}/realms/alzheimer-realm/protocol/openid-connect/certs

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Use JSON for message conversion
spring.main.allow-bean-definition-overriding=true

# OpenFeign — patient-service is discovered via Eureka by its application name
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Optional local overrides (gitignored file)
spring.config.import=optional:classpath:application-local.properties
