apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-pvc
  namespace: alzheimer
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: alzheimer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
      - name: nexus
        image: sonatype/nexus3:latest
        ports:
        - containerPort: 8081   # Nexus Web UI
        - containerPort: 8082   # Docker Hosted Repository
        resources:
          limits:
            memory: "4Gi"
            cpu: "2000m"
          requests:
            memory: "2Gi"
            cpu: "500m"
        env:
        - name: INSTALL4J_ADD_VM_PARAMS
          value: "-Xms1g -Xmx2g -XX:MaxDirectMemorySize=1g"
        volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
      volumes:
      - name: nexus-data
        persistentVolumeClaim:
          claimName: nexus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: alzheimer
spec:
  type: NodePort
  ports:
    - name: nexus-ui
      port: 8081
      targetPort: 8081
      nodePort: 30000       # Web UI: http://192.168.188.128:30000
    - name: nexus-docker
      port: 8082
      targetPort: 8082
      nodePort: 30082       # Docker registry: 192.168.188.128:30082
  selector:
    app: nexus
