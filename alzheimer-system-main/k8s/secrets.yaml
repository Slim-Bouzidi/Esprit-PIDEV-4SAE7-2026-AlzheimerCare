# ============================================================
# nexus-creds Secret — run this manually on Laptop 2 ONCE
# BEFORE applying any other manifests.
#
# Replace USERNAME and PASSWORD with your actual Nexus values.
# Default: admin / admin1234
#
# Command to create the secret (run on Laptop 2):
#   kubectl create secret docker-registry nexus-creds \
#     --docker-server=192.168.188.128:30082 \
#     --docker-username=admin \
#     --docker-password=admin1234 \
#     --docker-email=admin@alzheimer.local \
#     -n alzheimer
#
# This file is provided as documentation only.
# Do NOT store real credentials in a committed YAML.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: nexus-creds
  namespace: alzheimer
type: kubernetes.io/dockerconfigjson
data:
  # Base64 value below is a PLACEHOLDER — replace with the real value
  # generated by: kubectl create secret docker-registry ... (command above)
  .dockerconfigjson: REPLACE_WITH_BASE64_FROM_KUBECTL_COMMAND
